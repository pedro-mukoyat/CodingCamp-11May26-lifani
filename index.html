<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header>
      <h1>Expense &amp; Budget Visualizer</h1>
    </header>

    <main>

      <!-- Balance Summary -->
      <section id="summary" aria-label="Balance Summary">
        <div id="total-balance">
          <h2>Total Balance</h2>
          <p id="balance-amount">Rp 0</p>
        </div>
        <div id="limit-control">
          <label for="spend-limit">Highlight transactions above (Rp)</label>
          <input
            type="number"
            id="spend-limit"
            name="spend-limit"
            placeholder="e.g. 100000"
            min="0"
          />
        </div>
      </section>

      <!-- Add Transaction Form -->
      <section id="form-section" aria-label="Add Transaction">
        <h2>Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              name="item-name"
              placeholder="e.g. Lunch, Bus fare"
              required
            />
          </div>

          <div class="form-group">
            <label for="amount">Amount (Rp)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              placeholder="e.g. 50000"
              min="0"
              required
            />
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select a category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>

          <button type="submit">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section id="transactions-section" aria-label="Transaction History">
        <div class="section-header">
          <h2>Transaction History</h2>
          <div class="list-controls">
            <label for="sort-select" class="sr-only">Sort by</label>
            <select id="sort-select" aria-label="Sort transactions">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="amount-desc">Amount: High → Low</option>
              <option value="amount-asc">Amount: Low → High</option>
              <option value="category">Category A–Z</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list" aria-live="polite">
          <!-- Transactions rendered by app.js -->
        </ul>
      </section>

      <!-- Monthly Summary -->
      <section id="monthly-section" aria-label="Monthly Summary">
        <h2>Monthly Summary</h2>
        <div id="monthly-summary">
          <!-- Rendered by app.js -->
        </div>
      </section>

      <!-- Pie Chart -->
      <section id="chart-section" aria-label="Spending by Category">
        <h2>Spending by Category</h2>
        <div class="chart-container">
          <canvas id="expense-chart" role="img" aria-label="Pie chart showing spending by category"></canvas>
        </div>
      </section>

    </main>

    <footer>
      <p>CodingCamp Mini Project &mdash; lifani &copy; 2026</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
